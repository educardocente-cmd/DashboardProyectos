<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ejecutivo de Proyectos</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
<h1>Dashboard Ejecutivo de Proyectos</h1>
<p>Corte: Julio 2026</p>
</div>

<div class="cards">
<div class="card"><h3>Proyectos</h3><span>5</span></div>
<div class="card"><h3>Meta Superada</h3><span>1</span></div>
<div class="card"><h3>En Ejecución</h3><span>4</span></div>
<div class="card"><h3>Retrasados</h3><span>0</span></div>
</div>

<div class="panel">
<h2>Cumplimiento por Proyecto</h2>

<div class="item"><label>Sueños en Concreto (40%)</label><div class="progress"><div class="bar yellow" style="width:40%"></div></div></div>
<div class="item"><label>Sembrando Vida (112%)</label><div class="progress"><div class="bar green" style="width:100%"></div></div></div>
<div class="item"><label>Explora y Aprende (75%)</label><div class="progress"><div class="bar green" style="width:75%"></div></div></div>
<div class="item"><label>Espacios que Transforman (67%)</label><div class="progress"><div class="bar orange" style="width:67%"></div></div></div>
<div class="item"><label>Justos Contra la Anemia (70%)</label><div class="progress"><div class="bar orange" style="width:70%"></div></div></div>

</div>

<footer>Dashboard Ejecutivo 2026</footer>
</body>
</html>
